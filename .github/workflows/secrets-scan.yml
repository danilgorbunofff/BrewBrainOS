name: Secrets Scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  working-tree:
    name: Gitleaks (working tree)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan tracked files for secrets
        id: working_tree_scan
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git --source . --redact --report-format json --report-path gitleaks-working-tree.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload working-tree gitleaks report
        if: always() && hashFiles('gitleaks-working-tree.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-working-tree-report
          path: gitleaks-working-tree.json

      - name: Fail on working-tree secrets findings
        if: steps.working_tree_scan.outcome == 'failure'
        run: |
          echo "Potential secrets were detected in tracked files. Review the uploaded gitleaks-working-tree-report artifact."
          exit 1

  history:
    name: Gitleaks (history)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan git history for secrets
        id: history_scan
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --redact --report-format json --report-path gitleaks-history.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload history gitleaks report
        if: always() && hashFiles('gitleaks-history.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-history-report
          path: gitleaks-history.json

      - name: Fail on history secrets findings
        if: steps.history_scan.outcome == 'failure'
        run: |
          echo "Potential secrets were detected in git history. Rotate exposed credentials before rewriting history."
          exit 1