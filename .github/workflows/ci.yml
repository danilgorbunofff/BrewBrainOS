name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://ci-placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-placeholder-service-role-key' }}
      STRIPE_SECRET_KEY: ${{ vars.STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY || 'sk_test_ci_placeholder' }}
      STRIPE_WEBHOOK_SECRET: ${{ vars.STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_placeholder' }}
      SENTRY_DSN: ${{ vars.SENTRY_DSN || secrets.SENTRY_DSN || '' }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN || secrets.NEXT_PUBLIC_SENTRY_DSN || '' }}
      SENTRY_ENV: ci
      SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required build env
        run: npm run verify:env

      - name: Lint
        run: npm run lint

      - name: Run coverage tests
        run: npm run test:coverage

      - name: Install PostgreSQL client for ordered migration validation
        if: ${{ secrets.SUPABASE_MIGRATION_DB_URL != '' }}
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply ordered Supabase migrations to the shadow database
        if: ${{ secrets.SUPABASE_MIGRATION_DB_URL != '' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_MIGRATION_DB_URL }}
        run: |
          npm run verify:env:migrations
          npm run db:migrate:ordered

      - name: Warn when CI uses placeholder public Supabase values
        if: env.NEXT_PUBLIC_SUPABASE_URL == 'https://ci-placeholder.supabase.co' || env.NEXT_PUBLIC_SUPABASE_ANON_KEY == 'ci-placeholder-anon-key'
        run: echo "::warning::CI is using placeholder public Supabase values. Configure repository variables or secrets to exercise real integration paths."

      - name: Warn when CI uses placeholder server billing values
        if: env.SUPABASE_SERVICE_ROLE_KEY == 'ci-placeholder-service-role-key' || env.STRIPE_SECRET_KEY == 'sk_test_ci_placeholder' || env.STRIPE_WEBHOOK_SECRET == 'whsec_ci_placeholder'
        run: echo "::warning::CI is using placeholder service-role or Stripe billing secrets. Configure repository variables or secrets to fully exercise webhook and billing flows."

      - name: Build production app with analyzer
        run: npm run analyze

      - name: Generate bundle analysis report
        run: npm run bundle:report

      - name: Upload bundle analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: |
            .next/analyze
            analysis/bundle-top10.md

      - name: Verify service worker precache
        run: npm run verify:sw-precache

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run offline precache smoke test
        run: npm run test:offline-precache